<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Register | Campus Cyber Army</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/auth.css">

</head>

<body>

<div class="register-box">

<h2>Create Your Account</h2>

<form onsubmit="registerUser(); return false;">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>College Name</label>
<input type="text" id="college" placeholder="Enter your college" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" placeholder="Create password" required>
<span class="toggle-eye" onclick="togglePassword()">👁️</span>
</div>

<button class="register-btn">Register</button>

</form>

<div class="bottom-text">
Already a member? <a href="login.html">Login Now</a>
</div>

</div>


<script type="module" src="../assets/js/firebase-config.js"></script>
<script type="module" src="../assets/js/register.js"></script>


</body>


</html>
