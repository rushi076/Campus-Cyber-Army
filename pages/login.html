<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Login | Campus Cyber Army</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/auth.css">

</head>

<body>

<div class="login-box">
<h2>Login to Your Account</h2>

<form onsubmit="loginUser(); return false;">
<div class="form-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="form-group password-box">
<label>Password</label>
<input type="password" id="password" placeholder="Enter your password" required>
<span class="toggle-eye" onclick="togglePassword()">👁️</span>
</div>

<button class="login-btn" type="submit">Login</button>
</form>

<div class="bottom-text">
Don't have an account? <a href="register.html">Register Now</a>
</div>

</div>

<script type="module" src="../assets/js/firebase-config.js"></script>
<script type="module" src="../assets/js/auth.js"></script>

</body>
</html>
